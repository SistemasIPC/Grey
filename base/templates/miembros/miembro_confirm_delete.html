{% extends 'principal.html' %}

{% block content %}
<div class="barra-superior">

<a href="{% url 'miembro-list' %}">Volver </a>

</div>
<div class="container">
    <h2>Eliminar Miembro</h2>
    <p>¿Estás seguro de que deseas eliminar a <strong>{{ miembro.nombre }} {{ miembro.apellido }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'miembro-list' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock content %}
