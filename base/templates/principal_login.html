<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>La grey</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">

 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
 <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>


    <!-- En la cabecera (Head) -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" rel="stylesheet" />

    <!-- Al final del Body -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/js/select2.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>





     <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</head>
<body>
<style>

.header-principal {
     background-image: url('/media/header.jpg');
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    min-height: 250px;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
    padding: 20px;
    overflow: hidden;
}


.header-principal::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
}


.header-principal h1,
.header-principal p {
    position: relative;
    z-index: 2;
    margin: 0;
}


.header-principal h1 {
    font-size: 3rem;
    font-weight: bold;
}


.header-principal p {
    font-size: 1.2rem;
    margin-top: 10px;
}



/* =========================
   TABLET
========================= */
@media (max-width: 992px) {
    .header-principal {
        min-height: 220px;
    }
    .header-principal h1 {
        font-size: 2.3rem;
    }
}


/* =========================
   CELULAR
========================= */

@media (max-width: 576px) {
    .header-principal {
        min-height: 180px;
        padding: 15px;
    }

    .header-principal h1 {
        font-size: 1.7rem;
    }

    .header-principal p {
        font-size: 1rem;
    }
}

</style>






    <header class="header-principal text-gray text-center py-4">
        <h1>Bienvenido a la Grey</h1>
        <p>Cuidando de buena manera</p>
    </header>


       <!-- Menú de navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href=""></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">


                <ul class="navbar-nav">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="">Perfil ({{ user.username }})</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger" href="">Cerrar sesión</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href=""></a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href=""></a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>


    <div class="container">
        {% block content %}

        {% endblock content %}
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-4">
        <p>&copy; 2025 La Grey - Todos los derechos reservados</p>
    </footer>
</body>
</html>
