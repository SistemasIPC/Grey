{% extends "principal.html" %}
{% block content %}

<h3>Eliminar evento</h3>

<p>¿Seguro que desea eliminar "{{ evento.nombre }}"?</p>

<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger">Eliminar</button>
    <a href="{% url 'evento_list' %}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
