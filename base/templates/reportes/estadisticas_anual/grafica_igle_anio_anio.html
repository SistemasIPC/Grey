{% extends "principal.html" %}

{% block content %}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<h3>Comportamiento de la Iglesia ( {{anio_inicio}} -{{anio_actual}})</h3>
<!-- Chart.js -->

<h4>Membrec&iacute;a</h4>

<!-- 🔘 Selector de variables -->
<div class="mb-3">

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="0" checked>
        Miembros Inicio
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="1" checked>
        Miembros Final
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="2" checked>
        Ganados
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="3" checked>
        Perdidos
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="4" checked>
        Activos
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset" data-index="5" checked>
        Prom. escuela
    </label>


    <!-- Botón opcional -->
    <button id="toggleAll" class="btn btn-sm btn-secondary ms-3">
        Mostrar / Ocultar todo
    </button>

</div>

<!-- 📊 Gráfica -->
<div style="height: 500px;">

    <canvas id="grafica"></canvas>

</div>



<h4>Ingresos/egresos</h4>

<!-- 🔘 Selector de variables -->
<div class="mb-3">

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset-2" data-index="0" checked>
        Diezmo ofrenda
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset-2" data-index="1" checked>
        Aportes presbiterio
    </label>

    <label class="me-3">
        <input type="checkbox" class="toggle-dataset-2" data-index="2" checked>
        Otros gastos
    </label>

    <!-- Botón opcional -->
    <button id="toggleAll2" class="btn btn-sm btn-secondary ms-3">
        Mostrar / Ocultar todo
    </button>

</div>

<!-- 📊 Gráfica -->
<div style="height: 500px;">

    <canvas id="grafica2"></canvas>

</div>











<script>

const ctx = document.getElementById('grafica');

const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: {{ anios|safe }},
        datasets: [
            {
                label: 'Miembros Inicio',
                data: {{ inicio|safe }},
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Miembros Final',
                data: {{ final|safe }},
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Ganados',
                data: {{ ganados|safe }},
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Perdidos',
                data: {{ perdidos|safe }},
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Activos',
                data: {{ mactivos|safe }},
                borderWidth: 2,
                fill: false
            },
            {
                label: 'Prom. escuela',
                data: {{ promedioescuelas|safe }},
                borderWidth: 2,
                fill: false
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: 'top'
            }
        },
        interaction: {
            mode: 'index',
            intersect: false
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});


// 🔘 Mostrar / ocultar variables
document.querySelectorAll(".toggle-dataset").forEach(function(chk){

    chk.addEventListener("change", function(){

        const index = parseInt(this.dataset.index)

        chart.data.datasets[index].hidden = !this.checked

        chart.update()
    })

})


// 🔄 Botón mostrar / ocultar todo
document.getElementById("toggleAll").onclick = function(){

    let allHidden = chart.data.datasets.every(d => d.hidden)

    chart.data.datasets.forEach(d => d.hidden = !allHidden)

    document.querySelectorAll(".toggle-dataset").forEach(chk => {
        chk.checked = allHidden
    })

    chart.update()
}

</script>
