{% extends "principal.html" %}

{% block content %}

<div class="container">
<a  href="{% url 'lista_citas' %}">Volver a citas</a>
    <h3>

        Agendar reunión virtual

    </h3>

    <div class="alert alert-info">

        {{ miembro.nombre }}
        {{ miembro.apellido }}

        <br>

        {{ miembro.correo }}

    </div>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">

            <label>
                Título
            </label>

            <input type="text"
                   name="titulo"
                   class="form-control"
                   value="Cita"
                   required>

        </div>

        <div class="row">

            <div class="col-md-6">

                <label>
                    Fecha
                </label>

                <input type="date"
                       name="fecha"
                       class="form-control"
                       required>

            </div>

            <div class="col-md-6">

                <label>
                    Hora
                </label>

                <input type="time"
                       name="hora"
                       class="form-control"
                       required>

            </div>

        </div>

        <div class="mt-3">

            <label>
                Observación
            </label>

            <textarea name="observacion"
                      class="form-control">{{ consolidacion.observacion }}</textarea>

        </div>

        <button class="btn btn-success mt-3">

            Agendar reunión

        </button>

    </form>

</div>

{% endblock %}
