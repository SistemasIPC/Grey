{% extends 'presbiterio/principal.html' %}


{% block content %}
<h2>Eliminar Archivo</h2>
<p>¿Estás seguro de que deseas eliminar el archivo "{{ object.archivo.name }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Eliminar</button>
</form>
<a href="{% url 'acta_detail' object.id_acta.pk %}">Cancelar</a>
{% endblock %}
