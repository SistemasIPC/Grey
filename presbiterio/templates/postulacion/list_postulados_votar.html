{% extends 'presbiterio/principal.html' %}

{% block content %}
<div class="barra-superior">
    <a href="{% url 'menu_principal' %}">&#x1F860; Volver</a>
</div>
<h2>Votación para el órgano: {{ organo.descripcion }}</h2>
<form method="POST">
    {% csrf_token %}
    <ul>
        {% for p in postulados %}
        <li>
            <label>
                <input type="radio" name="postulado_id" value="{{ p.id }}">
                {{ p.id_miembro.nombre }} ({{ p.id_cargo.descripcion }})
            </label>
        </li>
        {% empty %}
        <li>No hay postulados en este órgano.</li>
        {% endfor %}
    </ul>
    <button type="submit" disabled id="btn-votar">Votar</button>
</form>

<script>
// Habilitar el botón "Votar" cuando se seleccione un postulado
const radioButtons = document.querySelectorAll('input[name="postulado_id"]');
const btnVotar = document.getElementById('btn-votar');

radioButtons.forEach(rb => {
    rb.addEventListener('change', () => {
        btnVotar.disabled = false;
    });
});
</script>
{% endblock %}
